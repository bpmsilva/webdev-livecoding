<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posicionamento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            padding: 20px 0;
            position: fixed;
            width: 100%;
            background-color: white;
            z-index: 10; /* Garante que o título fique acima dos outros elementos */
        }

        #container {
            background-color: rgba(173, 216, 230, 0.75);
            padding: 30px;
            height: 300vh;
        }

        .square {
            width: 300px;
            height: 300px;
            margin: 20px;
        }

        #primeira {
            background-color: red;
            position: absolute; /* Padrão é static */
            top: 250px;
            left: 200px;
        }

        #segunda {
            background-color: green;
            position: relative;
            top: -25px;
            left: 375px;
        }

        #terceira {
            background-color: blue;
            z-index: 1;
            position: fixed;
        }

        /* Centralizado apenas no container */
        #quarta {
            background-color: yellow;
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -150px;
            margin-left: -150px;
            z-index: -1; /* Coloca este elemento abaixo dos outros */
        }

        /* Centralizado na TELA, mesmo com scroll */
        /* #quarta {
            background-color: yellow;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        } */
    </style>
</head>

<body>
    <h1>Posicionamento</h1>
    <div id="container">
        <div id="primeira" class="square"></div>
        <div id="segunda" class="square"></div>
        <div id="terceira" class="square"></div>
        <div id="quarta" class="square"></div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #container {
            display: flex;
            flex-flow: row wrap; /* row wrap | column wrap | row nowrap | column nowrap */
            justify-content: space-around;
            align-items: center;
            height: 100vh;
            gap: 1em;
        }

        .item {
            /* Permite que os itens cresçam para preencher o espaço disponível */
            
            /*
            flex-grow: 1;
            flex-shrink: 1;
            flex-basis: 320px;
            */
            flex: 1 0 320px; /* flex-grow | flex-shrink | flex-basis */
            
            /* width: 200px; */
            height: 200px;
            display: inline-block;
        }

        #red-box { background-color: red; }
        #blue-box { background-color: blue; }
        #green-box { background-color: green; }
        #yellow-box { background-color: yellow; }
        #purple-box { background-color: purple; }
        #orange-box { background-color: orange; }
        #pink-box { background-color: pink; }
    </style>
</head>
<body>
    <div id="container">
        <div id="red-box" class="item"></div>
        <div id="blue-box" class="item"></div>
        <div id="green-box" class="item"></div>
        <div id="yellow-box" class="item"></div>
        <div id="purple-box" class="item"></div>
        <div id="orange-box" class="item"></div>
        <div id="pink-box" class="item"></div>
    </div>
</body>
</html>

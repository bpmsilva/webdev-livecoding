<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Simples</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            margin: 1em;
        }

        form {
            margin: auto;
            padding: 2em;
            width: 320px;
            border: 1px solid red;
        }

        fieldset {
            padding: 2em;
            /* text-align: center; */
            width: 100%;
        }

        button {
            width: 80%;
            padding: 0.5em;
        }

        /* Center button */
        button {
            display: block;
            margin: 0 auto;
        }

    </style>
</head>

<body>
    <h1>Formulário Simples</h1>
    <form action="#" method="post">
        <fieldset>
            <legend>Informações de Contato</legend>
            <label for="nome">Nome:</label>
            <br>
            <input id="nome" type="text" name="nome_acao" required>
            <br>
            <br>
            <label for="email">Email:</label>
            <br>
            <input id="email" type="email" name="email_acao" required>
            <br>
            <br>
            <label for="mensagem">Mensagem:</label>
            <br>
            <textarea id="mensagem" name="mensagem" rows="4" required></textarea>
            <br>
        </fieldset>
        <br>
        <button type="submit">Enviar</button>
    </form>
</body>

</html>

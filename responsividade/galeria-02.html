<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        img {
            width: 100%;
            max-width: 320px;
            height: auto;
        }

        section {
            flex: 1 1 300px;
            max-width: 320px;
        }
    </style>
</head>

<body>
    <h1>Galeria de Imagens</h1>
    <div id="gallery">
        <section><img src="assets/tile-01.jpg" alt="Tile 1"></section>
        <section><img src="assets/tile-02.jpg" alt="Tile 2"></section>
        <section><img src="assets/tile-03.jpg" alt="Tile 3"></section>
        <section><img src="assets/tile-04.jpg" alt="Tile 4"></section>
        <section><img src="assets/tile-05.jpg" alt="Tile 5"></section>
        <section><img src="assets/tile-06.jpg" alt="Tile 6"></section>
        <section><img src="assets/tile-07.jpg" alt="Tile 7"></section>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="cabecalho">Cabeçalho</h1>
    <p>Um parágrafo</p>
    <img src="http://pudim.com.br/pudim.jpg" alt="Um Pudim">
</body>
<script>
    let pudimImage = document.getElementsByTagName('img')[0];
    console.log(`O elemento de imagem tem o atributo src: ${pudimImage.src}`);
    console.log(`O elemento de imagem tem o atributo alt: ${pudimImage.alt}`);
</script>
</html>

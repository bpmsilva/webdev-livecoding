<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Exemplo localStorage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        input {
            padding: 5px;
        }

        button {
            padding: 5px 10px;
        }
    </style>
    <!-- Script com defer -->
    <script defer>
        document.addEventListener('DOMContentLoaded', () => {
            const inputNome = document.getElementById('nome');
            const mensagem = document.getElementById('mensagem');

            // Carrega o nome salvo ao abrir a página
            const nomeSalvo = localStorage.getItem('nome');
            if (nomeSalvo) {
                mensagem.textContent = `Bem-vindo de volta, ${nomeSalvo}!`;
                inputNome.value = nomeSalvo;
            }

            // Salva o nome no localStorage
            document.getElementById('salvar').addEventListener('click', () => {
                const nome = inputNome.value.trim();
                if (nome) {
                    localStorage.setItem('nome', nome);
                    mensagem.textContent = `Nome "${nome}" salvo com sucesso!`;
                } else {
                    mensagem.textContent = 'Por favor, digite um nome válido.';
                }
            });

            // Remove o nome do localStorage
            document.getElementById('limpar').addEventListener('click', () => {
                localStorage.removeItem('nome');
                mensagem.textContent = 'Nome removido!';
                inputNome.value = '';
            });
        });
    </script>
</head>

<body>
    <h1>Exemplo de localStorage</h1>

    <label for="nome">Digite seu nome: </label>
    <input type="text" id="nome" placeholder="Seu nome">
    <button id="salvar">Salvar</button>
    <button id="limpar">Limpar</button>

    <p id="mensagem"></p>
</body>

</html>

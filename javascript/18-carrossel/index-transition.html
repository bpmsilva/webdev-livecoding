<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <style>
    /* Estilos Globais: zerar margens e preenchimentos */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Estilos do Corpo */
    body {
      font-family: sans-serif;
      /* display flex, flex-direction e align-items
         aqui servem para centralizar o conteúdo */
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    .carrossel-container {
      max-width: 600px;
      overflow: hidden;
      /* Serve para "esconder" as imagens que estão fora da área visível */
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }

    .carrossel {
      display: flex;
      transition: transform 0.4s ease-in-out;
    }

    .botoes {
      margin-top: 1rem;
      display: flex;
      gap: 1rem;
    }

    .botoes button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
    }

    .botoes button:hover {
      background-color: #0056b3;
    }
  </style>
  <script>
    const images = [
      "assets/carrossel-01.jpeg",
      "assets/carrossel-02.jpeg",
      "assets/carrossel-03.jpeg",
    ];

    document.addEventListener("DOMContentLoaded", () => {
      const carrossel = document.querySelector(".carrossel");

      let currentIndex = 0;
      let imgElements = [];

      // Pré-carrega e adiciona as imagens ao carrossel
      // São elementos <img> que são criados dinamicamente
      // que serão adicionados ao carrossel
      images.forEach((src, index) => {

        // Cria um elemento <img> para cada imagem
        const img = document.createElement("img");

        // Define o atributo src da imagem
        img.src = src;

        // Adiciona a classe 'active' apenas para a primeira imagem
        if (index === 0) {
          img.classList.add("active");
        }

        // Adiciona o elemento <img> ao carrossel
        carrossel.appendChild(img);
        imgElements.push(img);
      });

      function nextImage() {
        imgElements[currentIndex].classList.remove("active");
        currentIndex = (currentIndex + 1) % imgElements.length;
        imgElements[currentIndex].classList.add("active");
      }

      setInterval(nextImage, 1000); // muda a cada 1 segundo
    });
  </script>
</head>

<body>
  <div class="carrossel"></div>
</body>

</html>

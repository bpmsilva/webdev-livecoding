<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    #inputTarefa {
      padding: 10px;
      width: 60%;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      margin-left: 5px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #fff;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 5px;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    li.concluida {
      text-decoration: line-through;
      color: gray;
    }

    .tarefas button {
      margin-left: 5px;
    }
  </style>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("btnAdd").addEventListener("click", adicionarTarefa);
    });

    function adicionarTarefa() {
      const input = document.getElementById("inputTarefa");
      const texto = input.value.trim();

      if (texto === "") return;

      // Limpa o campo de entrada
      input.value = "";

      const li = document.createElement("li");

      // Adiciona a tarefa ao item de lista
      const span = document.createElement("span");
      span.textContent = texto;
      li.appendChild(span);

      // Cria o div de tarefas
      const tarefa = document.createElement("div");
      tarefa.className = "tarefas";

      // Cria os botões de concluir
      const btnConcluir = document.createElement("button");
      btnConcluir.textContent = "Concluir";
      btnConcluir.addEventListener("click", () => concluirTarefa(btnConcluir));

      // Cria os botões de remover
      const btnRemover = document.createElement("button");
      btnRemover.textContent = "Remover";
      btnRemover.addEventListener("click", () => removerTarefa(btnRemover));

      // Adiciona os botões ao div de tarefa
      tarefa.appendChild(btnConcluir);
      tarefa.appendChild(btnRemover);
      li.appendChild(tarefa);

      // Adiciona o item de lista à lista de tarefas
      document.getElementById("listaTarefas").appendChild(li);
    }

    function concluirTarefa(botao) {
      const li = botao.closest("li");
      li.classList.toggle("concluida");
    }

    function removerTarefa(botao) {
      const li = botao.closest("li");
      li.remove();
    }
  </script>
</head>

<body>
  <h1>Lista de Tarefas</h1>
  <input type="text" id="inputTarefa" placeholder="Digite uma tarefa" />
  <button id="btnAdd">Adicionar</button>
  <ul id="listaTarefas"></ul>
</body>

</html>
